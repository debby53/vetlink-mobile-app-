# Load an extensionless .env file as a properties source.
# Prefer a project-root .env for local runs, then fall back to a bundled resource if present.
spring.config.import=optional:file:.env[.properties],optional:classpath:.env[.properties]

spring.application.name=VetLink-Backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# Server
server.port=${PORT:8081}

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:none}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.vetLiink=${APP_LOG_LEVEL:INFO}

# Multipart upload
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:500MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:500MB}

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Performance
server.tomcat.threads.max=200
server.tomcat.connectionTimeout=120000

# App
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.seed.admin.enabled=${SEED_ADMIN:true}
app.mail.from=${MAIL_FROM:no-reply@vetlink.com}

# Email
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
