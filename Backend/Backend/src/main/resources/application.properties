spring.application.name=VetLink-Backend
server.port=8888

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/vetlink_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=vetlink_secret_key_2026_agriculture_veterinary_care_secure_authentication
jwt.expiration=86400000


# Logging
logging.level.root=INFO
logging.level.com.vetlink=DEBUG

# Multipart File Upload Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# HTTP Encoding and Response Configuration
server.tomcat.use-relative-redirects=true
server.compression.enabled=false
server.tomcat.min-spare-threads=2
server.tomcat.max-threads=200
server.http2.enabled=false
server.error.include-message=always
server.tomcat.accesslog.enabled=false
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# Server Configuration
server.tomcat.threads.max=200
server.tomcat.connectionTimeout=120000
server.tomcat.keepAliveTimeout=120000