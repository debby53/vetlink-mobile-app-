services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vetlink_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vetlink_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend/Backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8081
      DB_URL: jdbc:postgresql://db:5432/vetlink_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-jwt-secret-for-real-use
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      SPRING_PROFILES_ACTIVE: docker
      DDL_AUTO: update
      SHOW_SQL: false
      APP_LOG_LEVEL: INFO
      SEED_ADMIN: true
      MULTIPART_MAX_FILE_SIZE: 500MB
      MULTIPART_MAX_REQUEST_SIZE: 500MB
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@vetlink.com}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-true}
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/locations/provinces >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./vetLink
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  postgres_data:
  backend_uploads:
