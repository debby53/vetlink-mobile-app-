services:
  - type: web
    name: vetlink-backend
    runtime: docker
    rootDir: Backend/Backend
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DDL_AUTO
        value: none
      - key: SHOW_SQL
        value: false
      - key: APP_LOG_LEVEL
        value: INFO
      - key: SEED_ADMIN
        value: false
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
