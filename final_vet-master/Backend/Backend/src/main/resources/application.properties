# Load an extensionless .env file as a properties source.
spring.config.import=optional:file:.env[.properties],optional:classpath:.env[.properties]

spring.application.name=VetLink-Backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vetlink_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:none}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:MyVerySecretAndVeryLongJwtSecretKeyForVetLinkApp123456}
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.vetLiink=${APP_LOG_LEVEL:INFO}

# Multipart upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Encoding (updated - replaces deprecated server.servlet.encoding.*)
spring.mandatory-file-encoding=UTF-8

# Performance
server.tomcat.threads.max=200
server.tomcat.connection-timeout=120000

# App
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.seed.admin.enabled=${SEED_ADMIN:false}